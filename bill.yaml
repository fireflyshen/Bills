        - method: 余额
          full-match: true
          method-account: Assets:Cash:DigitalWallet:Alipay:Balance

        - method: 余额宝
          full-match: true
          method-account: Assets:Investments:MoneyMarket:Alipay:YuEBao

        - method: 工商银行储蓄卡(4931)
          item: 余额宝-单次转入
          method-account: Assets:Bank:ICBC:Checking:4931
          target-account: Assets:Investments:MoneyMarket:Alipay:YuEBao

        - type: 不计收支
          item: 收益发放
          method-account: Income:Interest:Alipay:YuEBao
          target-account: Assets:Investments:MoneyMarket:Alipay:YuEBao

        - type: 不计收支
          item: 信用卡还款
          method: 余额宝
          method-account: Assets:Investments:MoneyMarket:Alipay:YuEBao
          target-account: Liabilities:CreditCard:ICBC:8393

        - type: 不计收支
          item: 余额宝-转出到银行卡
          method: 中信银行储蓄卡(4668)
          method-account: Assets:Investments:MoneyMarket:Alipay:YuEBao
          target-account: Assets:Bank:CNCB:Checking:4668

        - type: 不计收支
          item: 余额宝-转出到银行卡
          method: 中国工商银行储蓄卡(4931)
          method-account: Assets:Investments:MoneyMarket:Alipay:YuEBao
          target-account: Assets:Bank:ICBC:Checking:4931

        - peer: 零食很忙
          method: 工商银行信用卡(8393)
          method-account: Liabilities:CreditCard:ICBC:8393
          target-account: Expenses:Food:Snacks

        - peer: 零食有鸣
          method: 工商银行信用卡(8393)
          method-account: Liabilities:CreditCard:ICBC:8393
          target-account: Expenses:Food:Snacks

        - peer: 湖南鸣鸣很忙商业连锁股份有限公司
          method: 工商银行信用卡(8393)&红包
          method-account: Liabilities:CreditCard:ICBC:8393
          target-account: Expenses:Food:Snacks

        - peer: 中国工商银行
          method: 中国工商银行储蓄卡(4931)
          method-account: Assets:Investments:MoneyMarket:Alipay:YuEBao
          target-account: Assets:Bank:ICBC:Checking:4931

        - peer: 沈博
          method: 余额
          method-account: Assets:Investments:MoneyMarket:Alipay:YuEBao
          target-account: Assets:Cash:DigitalWallet:Alipay:Balance

        - peer: 中信银行
          method: 余额
          method-account: Assets:Cash:DigitalWallet:Alipay:Balance
          target-account: Assets:Bank:CNCB:Checking:4668

        - peer: "*博"
          method: 账户余额
          method-account: Assets:Cash:DigitalWallet:Alipay:Balance
          target-account: Assets:Bank:CNCB:Checking:4668

        - item: 余额宝-自动转入
          method-account: Assets:Cash:DigitalWallet:Alipay:Balance
          target-account: Assets:Investments:MoneyMarket:Alipay:YuEBao

        - method: 工商银行信用卡(8393)
          type: 不计收支
          status: 退款成功
          target-account: Liabilities:CreditCard:ICBC:8393

        - day-range: 8-11
          min-amount: 10.00
          max-amount: 20.00
          target-account: Expenses:Technology:Network:Proxy

